<!-- AfriVid Error Logger -->
<script>
(function() {
  const _logs = [];
  const _maxLogs = 100;
  
  // Capture all JS errors
  window.addEventListener('error', function(e) {
    const entry = {
      type: 'ERROR',
      message: e.message,
      file: e.filename ? e.filename.split('/').pop() : 'unknown',
      line: e.lineno,
      col: e.colno,
      time: new Date().toISOString()
    };
    _logs.unshift(entry);
    if (_logs.length > _maxLogs) _logs.pop();
    console.error(`[AfriVid ERROR] ${entry.message} (${entry.file}:${entry.line})`);
    if (window._afrivid_log_ui) window._afrivid_log_ui(entry);
  });

  // Capture unhandled promise rejections
  window.addEventListener('unhandledrejection', function(e) {
    const entry = {
      type: 'PROMISE',
      message: e.reason?.message || String(e.reason),
      file: 'async',
      line: 0,
      time: new Date().toISOString()
    };
    _logs.unshift(entry);
    if (_logs.length > _maxLogs) _logs.pop();
    console.error(`[AfriVid PROMISE] ${entry.message}`);
    if (window._afrivid_log_ui) window._afrivid_log_ui(entry);
  });

  // Capture fetch errors
  const _origFetch = window.fetch;
  window.fetch = async function(...args) {
    const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || 'unknown';
    const shortUrl = url.length > 60 ? url.slice(0,60)+'...' : url;
    try {
      const res = await _origFetch(...args);
      if (!res.ok) {
        const entry = {
          type: 'FETCH',
          message: `HTTP ${res.status} → ${shortUrl}`,
          file: 'fetch',
          line: 0,
          time: new Date().toISOString()
        };
        _logs.unshift(entry);
        if (_logs.length > _maxLogs) _logs.pop();
        console.warn(`[AfriVid FETCH] ${entry.message}`);
        if (window._afrivid_log_ui) window._afrivid_log_ui(entry);
      }
      return res;
    } catch(e) {
      const entry = {
        type: 'FETCH',
        message: `FAILED → ${shortUrl}: ${e.message}`,
        file: 'fetch',
        line: 0,
        time: new Date().toISOString()
      };
      _logs.unshift(entry);
      if (_logs.length > _maxLogs) _logs.pop();
      console.error(`[AfriVid FETCH ERROR] ${entry.message}`);
      if (window._afrivid_log_ui) window._afrivid_log_ui(entry);
      throw e;
    }
  };

  // Expose logs globally
  window._afrivid_errors = _logs;
  window._afrivid_show_errors = function() {
    console.group('AfriVid Error Log');
    _logs.forEach(l => console.log(`[${l.type}] ${l.time} - ${l.message}`));
    console.groupEnd();
    return _logs;
  };

  console.log('[AfriVid] Error logger initialized ✅');
})();
</script>

@media(max-width:768px){

  /* Template grid */

  /* Video canvas */

  /* Hide non-essential on mobile */
  .topbar-divider{display:none;}
  
  /* Main padding */

  /* Modals full screen */
  .modal-box,
  .login-box{
    width:95% !important;
    max-width:100% !important;

    padding:1.25rem !important;

  /* Page header */

let isDragging = false;
let dragOffset = {x:0,y:0};
let designBg = '#050A14';
let W = 800, H = 800;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('btn-signin').style.display = 'none';

// INIT CANVAS
function initCanvas() {
  const canvas = document.getElementById('design-canvas');
  canvas.width = W; canvas.height = H;
  renderCanvas();
  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', () => { isDragging = false; });
  canvas.addEventListener('dblclick', onDblClick);
  canvas.addEventListener('touchstart', onTouchStart, {passive:true});
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchend', () => { isDragging = false; });
}

function renderCanvas() {
  const canvas = document.getElementById('design-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  // Background
  if (designBg.includes('gradient')) {
    const colors = designBg.match(/#[a-fA-F0-9]{6}/g) || ['#050A14','#0D1F35'];
    const grad = ctx.createLinearGradient(0,0,W,H);
    colors.forEach((c,i) => grad.addColorStop(i/(colors.length-1),c));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = designBg;
  }
  ctx.fillRect(0,0,W,H);
  // Elements
  elements.forEach((el,idx) => {
    ctx.save();
    if (el.type==='text') {
      ctx.fillStyle = el.color||'#fff';
      ctx.font = `${el.weight||700} ${el.size||32}px ${el.font||'Syne'}, sans-serif`;
      ctx.textAlign = el.align||'left';
      ctx.fillText(el.text, el.x, el.y);
    } else if (el.type==='rect') {
      ctx.fillStyle = el.color||'#F5A623';
      ctx.fillRect(el.x, el.y, el.w||200, el.h||100);
    } else if (el.type==='circle') {
      ctx.fillStyle = el.color||'#F5A623';
      ctx.beginPath();
      ctx.arc(el.x, el.y, el.r||50, 0, Math.PI*2);
      ctx.fill();
    } else if (el.type==='line') {
      ctx.strokeStyle = el.color||'#F5A623';
      ctx.lineWidth = el.size||3;
      ctx.beginPath();
      ctx.moveTo(el.x, el.y);
      ctx.lineTo(el.x2||el.x+200, el.y2||el.y);
      ctx.stroke();
    } else if (el.type==='image' && el.img) {
      ctx.drawImage(el.img, el.x, el.y, el.w||200, el.h||200);
    }
    if (selectedEl===idx) {
      ctx.strokeStyle='#F5A623'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
      const b = getBounds(el);
      ctx.strokeRect(b.x-5,b.y-5,b.w+10,b.h+10);
      ctx.setLineDash([]);
    }
    ctx.restore();
  });
}

function getBounds(el) {
  if (el.type==='text') return {x:el.x,y:el.y-(el.size||32),w:200,h:el.size||32};
  if (el.type==='rect') return {x:el.x,y:el.y,w:el.w||200,h:el.h||100};
  if (el.type==='circle') return {x:el.x-(el.r||50),y:el.y-(el.r||50),w:(el.r||50)*2,h:(el.r||50)*2};
  if (el.type==='image') return {x:el.x,y:el.y,w:el.w||200,h:el.h||200};
  return {x:el.x,y:el.y,w:100,h:30};
}

function getCanvasPos(e) {
  const canvas = document.getElementById('design-canvas');
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX-rect.left) * (canvas.width/rect.width),
    y: (e.clientY-rect.top) * (canvas.height/rect.height)
  };
}

function onMouseDown(e) {
  const {x,y} = getCanvasPos(e);
  let found = false;
  for (let i=elements.length-1;i>=0;i--) {
    const b = getBounds(elements[i]);
    if (x>=b.x-8&&x<=b.x+b.w+8&&y>=b.y-8&&y<=b.y+b.h+8) {
      selectedEl=i; isDragging=true;
      dragOffset={x:x-elements[i].x,y:y-elements[i].y};
      found=true; break;
    }
  }
  if (!found) selectedEl=null;
  updateElementControls();
  renderCanvas();
}

function onMouseMove(e) {
  if (!isDragging||selectedEl===null) return;
  const {x,y} = getCanvasPos(e);
  elements[selectedEl].x = x-dragOffset.x;
  elements[selectedEl].y = y-dragOffset.y;
  renderCanvas();
}

function onTouchStart(e) {
  if (e.touches.length!==1) return;
  onMouseDown({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});
}

function onTouchMove(e) {
  if (e.touches.length!==1) return;
  e.preventDefault();
  onMouseMove({clientX:e.touches[0].clientX,clientY:e.touches[0].clientY});
}

function onDblClick(e) {
  if (selectedEl!==null&&elements[selectedEl].type==='text') {
    const t = prompt('Edit text:', elements[selectedEl].text);
    if (t!==null) { elements[selectedEl].text=t; saveHistory(); renderCanvas(); }
  }
}

function updateElementControls() {
  const ctrl = document.getElementById('design-element-controls');
  if (selectedEl!==null) {
    ctrl.style.display='block';
    document.getElementById('design-element-color').value = elements[selectedEl].color||'#ffffff';
    document.getElementById('design-element-size').value = elements[selectedEl].size||elements[selectedEl].r||32;
  } else {
    ctrl.style.display='none';
  }
}

function saveHistory() {
  history.push(JSON.stringify(elements.map(e=>({...e,img:e.img?'img':null}))));
  if (history.length>20) history.shift();
}

window._addText = window.addText = function() {
  elements.push({type:'text',text:'Your Text Here',x:W/2-80,y:H/2,color:'#ffffff',size:48,font:'Syne',weight:700,align:'left'});

}

window._addShape = window.addShape = function(type) {
  if (type==='rect') elements.push({type:'rect',x:W/2-100,y:H/2-50,w:200,h:100,color:'#F5A623'});

window._addImageElement = window.addImageElement = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      elements.push({type:'image',img,x:W/2-100,y:H/2-100,w:200,h:200});
      selectedEl=elements.length-1;

  };
  reader.readAsDataURL(file);
}

function buildDesignPrompt(type, userPrompt, W, H) {
  const cx = Math.round(W/2);
  const cy = Math.round(H/2);

  const typeGuides = {
    logo: `You are a professional logo designer. Create a logo for: "${userPrompt}".
Canvas: ${W}x${H}px (square format).
LOGO RULES:
- Center everything around (${cx}, ${cy})
- Use large bold letter(s) as the main element (size 180-280px)
- Add a geometric shape behind the letter (circle or rect as backdrop)
- Add company name below center (size 60-80px, weight 800)
- Add a short tagline below name (size 24-30px, weight 400, muted color)
- Add decorative accent lines or dots for polish
- Use gradient background: dark navy to slightly lighter
- Max 12 elements. Make it look like a Fortune 500 company logo.`,

    poster: `You are a professional poster designer. Create an event poster for: "${userPrompt}".
Canvas: ${W}x${H}px (portrait format).
POSTER RULES:
- Add a bold top accent bar (rect, full width, height 10-12px, gold color) at y=0
- Add event title in HUGE bold text (size 100-140px) at upper third
- Add subtitle or date in medium text (size 50-60px) below title
- Add location/details in smaller text (size 36-42px)
- Add decorative circles or geometric shapes for visual interest
- Add bottom accent bar at y=${H-12}
- Add organizer name at bottom center (size 28px)
- Use dark background with gold and green accents
- Max 15 elements. Make it visually striking and professional.`,

    certificate: `You are a professional certificate designer. Create a certificate for: "${userPrompt}".
Canvas: ${W}x${H}px (A4 portrait).
CERTIFICATE RULES:
- Add gold border: 4 rects forming a frame (top, bottom, left, right, thickness 14px)
- Add inner border: 4 thinner rects (thickness 4px, offset 30px from edges, gold 30% opacity)
- Title "CERTIFICATE OF ${userPrompt.toUpperCase().includes('ACHIEVEMENT') ? 'ACHIEVEMENT' : 'PARTICIPATION'}" at top (size 54-64px, weight 800, dark color, centered at x=${cx})
- "This is to certify that" text (size 28-32px, muted, centered)
- Recipient name placeholder in gold (size 80-90px, weight 800, centered)
- Gold underline rect below name
- "has successfully completed" text (size 28px, muted)
- Program name in bold (size 48-56px, weight 700, dark, centered)
- Date and signature placeholders at bottom
- Organization name at very bottom (size 28px)
- White background (#ffffff), gold accents
- Max 18 elements.`,

    flyer: `You are a professional flyer designer. Create a marketing flyer for: "${userPrompt}".
Canvas: ${W}x${H}px.
FLYER RULES:
- Bold attention-grabbing headline at top third (size 90-120px, weight 900)
- Supporting text below headline (size 44-54px)
- Key details/bullet points in middle section (size 32-38px each)
- Strong call-to-action at bottom (size 48px, in a colored rect button shape)
- Decorative geometric shapes for visual energy
- Vibrant gradient background
- Contact or website info at very bottom (size 24px)
- Max 14 elements. Make it eye-catching.`,

    banner: `You are a professional banner designer. Create a wide banner for: "${userPrompt}".
Canvas: ${W}x${H}px (landscape format).
BANNER RULES:
- Logo/brand element on left side (large letter or shape, x=${Math.round(W*0.12)})
- Main headline in center-left (size 80-100px, weight 800, x=${Math.round(W*0.25)})
- Subheading below headline (size 38-44px, gold color)
- Decorative circles or shapes on right side for balance
- Horizontal accent line under headline
- Website or CTA on right side (size 28-32px)
- Dark gradient background left to right
- Max 12 elements.`,

    social: `You are a professional social media designer. Create a social media graphic for: "${userPrompt}".
Canvas: ${W}x${H}px (square or portrait).
SOCIAL RULES:
- Top accent bar (rect, full width, height 6px, gold)
- Bold hook headline (size 80-100px, weight 900) in upper half
- Supporting text in middle (size 40-48px)
- Decorative geometric shapes for visual interest
- Brand handle or watermark at bottom (size 28-32px, gold, monospace font)
- Bottom accent bar
- Dark background with strong contrast
- Max 12 elements. Make it scroll-stopping.`,

    icon: `You are a professional app icon designer. Create an app icon for: "${userPrompt}".
Canvas: ${W}x${H}px (square).
ICON RULES:
- Rounded rect background filling most of canvas (slightly smaller, rounded corners implied by design)
- Large central symbol: bold letter, simple shape, or combined mark (size 200-280px)
- The symbol should be instantly recognizable at small sizes
- Maximum 2-3 colors
- No text other than possibly a single letter
- Clean, bold, minimal
- Max 6 elements.`
  };

  const guide = typeGuides[type] || typeGuides.poster;

  return `${guide}

ELEMENT TYPES AVAILABLE:
- text: {type:"text", text:"...", x:number, y:number, color:"#hex", size:number, font:"Syne" or "Space Mono", weight:400|700|800|900, align:"center"|"left"|"right"}
- rect: {type:"rect", x:number, y:number, w:number, h:number, color:"#hex or rgba(r,g,b,a)"}
- circle: {type:"circle", x:number, y:number, r:number, color:"#hex or rgba(r,g,b,a)"}

BRAND COLORS:
- Gold: #F5A623 (primary accent)
- Dark: #050A14 (deep background)
- Navy: #0D1F35 (secondary background)  
- Green: #74C69D (success/highlight)
- White: #F8F9FC (text on dark)
- Muted: rgba(248,249,252,0.5) (secondary text)
- Red: #E63329 (danger/alert)

COORDINATE SYSTEM: (0,0) = top-left, (${W},${H}) = bottom-right
For text: x,y is the baseline position. Center text by setting x=${cx} and align="center"
For circles: x,y is the CENTER of the circle
For rects: x,y is the TOP-LEFT corner

QUALITY RULES:
- Spacing: leave at least 60px padding from canvas edges
- Typography hierarchy: vary sizes dramatically (headline 3-4x larger than body)
- Contrast: ensure text is readable against its background
- Balance: distribute elements to avoid clustering
- Professional: this must look like it was made by a senior designer

Return ONLY a valid JSON object, no markdown, no explanation:
{"background":"#hex or linear-gradient(135deg,#hex1,#hex2)","elements":[...]}`;
}

window._generateAIDesign = window.generateAIDesign = async function() {
  const prompt = document.getElementById('design-ai-prompt').value.trim();
  const type = document.getElementById('design-type').value;
  if (!prompt) { alert('Describe your design first'); return; }
  const btn = document.getElementById('design-generate-btn');
  const status = document.getElementById('design-status');
  btn.textContent='[..] Generating...'; btn.disabled=true;
  status.textContent='Creating your '+type+'...';
  try {
    // Try image generation first
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(),60000);
    const res = await fetch('http://localhost:5051/generate-image',{
      method:'POST', headers:{'Content-Type':'application/json'},
      signal:ctrl.signal,
      body:JSON.stringify({prompt:`Professional ${type} design, ${prompt}. High quality, clean, modern.`})
    });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('Image generation failed');
    const blob = await res.blob();
    const imgUrl = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const canvas=document.getElementById('design-canvas');
      canvas.width=W; canvas.height=H;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,W,H);
      elements=[{type:'image',img,x:0,y:0,w:W,h:H}];
      designBg='#ffffff';
      saveHistory();
      status.textContent='[ok] Design generated!';
      status.style.color='#74C69D';
      addLog('success','[ok] Design generated!');
    };
    img.src=imgUrl;
  } catch(e) {
    // Fallback to text-based design
    try {
      const res2 = await fetch('https://yan-ai-worker.youngafricansn.workers.dev',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',max_tokens:2000,
          messages:[{role:'user',content:buildDesignPrompt(type, prompt, W, H)}]
        })
      });
      const data=await res2.json();
      const match=data.content[0].text.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('No JSON');
      const design=JSON.parse(match[0]);
      designBg=design.background||'#050A14';
      elements=(design.elements||[]).map(e=>({...e}));
      saveHistory(); renderCanvas();
      status.textContent='[ok] Design created!';
      status.style.color='#74C69D';
      addLog('success','[ok] Design generated!');
    } catch(e2) {
      status.textContent='[x] Failed. Try again.';
      status.style.color='#E63329';
      addLog('error','[x] '+e2.message);
    }
  }
  btn.textContent='✦ Generate Design'; btn.disabled=false;
}

window._downloadDesign = window.downloadDesign = function(format, scale=1) {
  const canvas=document.getElementById('design-canvas');
  selectedEl=null; renderCanvas();
  if (scale>1) {
    const hi=document.createElement('canvas');
    hi.width=canvas.width*scale; hi.height=canvas.height*scale;
    const ctx=hi.getContext('2d');
    ctx.scale(scale,scale); ctx.drawImage(canvas,0,0);
    const url=hi.toDataURL(`image/${format}`,format==='jpeg'?0.95:1);
    const a=document.createElement('a');
    a.href=url; a.download=`AfriVid-Design-${hi.width}x${hi.height}.${format}`; a.click();
    return;
  }
  const url=canvas.toDataURL(`image/${format}`,format==='jpeg'?0.92:1);
  const a=document.createElement('a');
  a.href=url; a.download=`AfriVid-Design-${Date.now()}.${format}`; a.click();
  addLog('success',`[ok] Downloaded as ${format.toUpperCase()}`);
}

window._downloadDesignSVG = window.downloadDesignSVG = function() {
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  if (designBg.includes('gradient')) {
    const colors=designBg.match(/#[a-fA-F0-9]{6}/g)||['#050A14','#0D1F35'];
    svg+=`<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">`;
    colors.forEach((c,i)=>{svg+=`<stop offset="${i/(colors.length-1)*100}%" style="stop-color:${c}"/>`;});
    svg+=`</linearGradient></defs><rect width="${W}" height="${H}" fill="url(#bg)"/>`;
  } else {
    svg+=`<rect width="${W}" height="${H}" fill="${designBg}"/>`;
  }
  elements.forEach(el=>{

  });

  const blob=new Blob([svg],{type:'image/svg+xml'});

// ---- DESIGN FUNCTIONS FROM OLD ----
function initDesignCanvas() {
  const canvas = document.getElementById('design-canvas');
  if (!canvas) return;
  canvas.width = designW;
  canvas.height = designH;
  renderDesign();
  
  canvas.addEventListener('mousedown', onDesignMouseDown);
  canvas.addEventListener('mousemove', onDesignMouseMove);
  canvas.addEventListener('mouseup', onDesignMouseUp);
  canvas.addEventListener('dblclick', onDesignDblClick);
}

function resizeCanvas() {
  const size = document.getElementById('design-size').value;
  const parts = size.split('x');
  designW = parseInt(parts[0]);
  designH = parseInt(parts[1]);
  const canvas = document.getElementById('design-canvas');
  canvas.width = designW;
  canvas.height = designH;
  renderDesign();
}

function renderDesign() {
  const canvas = document.getElementById('design-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Background
  if (designBg.includes('gradient')) {
    const grad = parseGradient(ctx, designBg, W, H);
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = designBg;
  }
  ctx.fillRect(0, 0, W, H);

  // Draw elements
  designElements.forEach((el, idx) => {
    ctx.save();
    const isSelected = selectedElement === idx;

    if (el.type === 'text') {
      ctx.fillStyle = el.color || '#ffffff';
      ctx.font = `${el.weight || 700} ${el.size || 32}px ${el.font || 'Syne'}, sans-serif`;
      ctx.textAlign = el.align || 'left';
      ctx.fillText(el.text, el.x, el.y);
    } else if (el.type === 'rect') {
      ctx.fillStyle = el.color || '#F5A623';
      ctx.fillRect(el.x, el.y, el.w || 200, el.h || 100);
    } else if (el.type === 'circle') {
      ctx.fillStyle = el.color || '#F5A623';
      ctx.beginPath();
      ctx.arc(el.x, el.y, el.r || 50, 0, Math.PI * 2);
      ctx.fill();
    } else if (el.type === 'line') {
      ctx.strokeStyle = el.color || '#F5A623';
      ctx.lineWidth = el.size || 3;
      ctx.beginPath();
      ctx.moveTo(el.x, el.y);
      ctx.lineTo(el.x2 || el.x + 200, el.y2 || el.y);
      ctx.stroke();
    } else if (el.type === 'image' && el.img) {
      ctx.drawImage(el.img, el.x, el.y, el.w || 200, el.h || 200);
    }

    // Selection indicator
    if (isSelected) {
      ctx.strokeStyle = '#F5A623';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 3]);
      const bounds = getElementBounds(el);
      ctx.strokeRect(bounds.x - 5, bounds.y - 5, bounds.w + 10, bounds.h + 10);
      ctx.setLineDash([]);
    }
    ctx.restore();
  });
}

function onDesignMouseDown(e) {
  const canvas = document.getElementById('design-canvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  // Find clicked element (reverse order - top first)
  // Skip background images (type=image at index 0 that covers full canvas)
  let found = false;
  for (let i = designElements.length - 1; i >= 0; i--) {
    const el = designElements[i];
    // Lock full-canvas background images
    if (el.type === 'image' && el.x === 0 && el.y === 0 && 
        el.w >= designW * 0.9 && el.h >= designH * 0.9) continue;
    const bounds = getElementBounds(el);
    if (x >= bounds.x - 10 && x <= bounds.x + bounds.w + 10 &&
        y >= bounds.y - 10 && y <= bounds.y + bounds.h + 10) {
      selectedElement = i;
      isDesignDragging = true;
      designDragOffset = { x: x - el.x, y: y - el.y };
      found = true;
      break;
    }
  }

  // Only deselect if clicking on empty canvas area (not on controls)
  if (!found && e.target === canvas) {
    selectedElement = null;
  }
  
  updateElementControls();
  renderDesign();
}

function onDesignMouseMove(e) {
  if (!isDesignDragging || selectedElement === null) return;
  const canvas = document.getElementById('design-canvas');
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;
  designElements[selectedElement].x = x - designDragOffset.x;
  designElements[selectedElement].y = y - designDragOffset.y;
  renderDesign();
}

function updateSelectedElement(prop, value) {
  if (selectedElement === null) return;
  const el = designElements[selectedElement];
  if (prop === 'color') {
    el.color = value;
    // Update color picker to show current value
    const cp = document.getElementById('design-element-color');
    if (cp) cp.value = value;
  }
  if (prop === 'size') { el.size = parseInt(value); el.r = parseInt(value); }
  if (prop === 'font') el.font = value;
  if (prop === 'weight') el.weight = value;
  renderDesign(); // Render immediately without saving history on every keystroke
}

function deleteSelectedElement() {
  if (selectedElement === null) return;
  designElements.splice(selectedElement, 1);
  selectedElement = null;
  updateElementControls();
  saveDesignHistory();
  renderDesign();
}

function addDesignText() {
  designElements.push({
    type: 'text', text: 'Your Text Here',
    x: designW / 2 - 100, y: designH / 2,
    color: '#ffffff', size: 48, font: 'Syne', weight: 700, align: 'left'
  });
  selectedElement = designElements.length - 1;
  saveDesignHistory();
  renderDesign();
}

function addDesignShape(type) {
  if (type === 'rect') designElements.push({ type: 'rect', x: designW/2-100, y: designH/2-50, w: 200, h: 100, color: '#F5A623' });
  if (type === 'circle') designElements.push({ type: 'circle', x: designW/2, y: designH/2, r: 60, color: '#F5A623' });
  if (type === 'line') designElements.push({ type: 'line', x: designW/2-100, y: designH/2, x2: designW/2+100, y2: designH/2, color: '#F5A623', size: 3 });
  selectedElement = designElements.length - 1;
  saveDesignHistory();
  renderDesign();
}

function addDesignImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      designElements.push({ type: 'image', img, x: designW/2-100, y: designH/2-100, w: 200, h: 200 });
      selectedElement = designElements.length - 1;
      saveDesignHistory();
      renderDesign();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearDesignCanvas() {
  if (!confirm('Clear all elements?')) return;
  designElements = [];
  selectedElement = null;
  saveDesignHistory();
  renderDesign();
}

function saveDesignHistory() {
  designHistory.push(JSON.stringify(designElements.map(e => ({...e, img: e.img ? 'img' : null}))));
  if (designHistory.length > 20) designHistory.shift();
}

window._generateDesign = window.generateDesign = async function() {
  const prompt = document.getElementById('design-ai-prompt').value.trim();
  if (!prompt) { alert('Describe your design first'); return; }

  const btn = document.getElementById('design-generate-btn');
  const statusEl = document.getElementById('design-status');
  if (btn) { btn.textContent = '[..] Creating...'; btn.disabled = true; }
  if (statusEl) { statusEl.textContent = 'AfriVid is designing...'; statusEl.style.color = '#F5A623'; }

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const response = await fetch('https://yan-ai-worker.youngafricansn.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller.signal,
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: `Create a professional design based on: "${prompt}"

Canvas is ${designW}x${designH} pixels.

Return ONLY a valid JSON object, no other text:
{
  "background": "#050A14",
  "elements": [
    {"type": "text", "text": "AfriVid Studio", "x": 400, "y": 300, "color": "#F5A623", "size": 72, "font": "Syne", "weight": 800, "align": "center"},
    {"type": "rect", "x": 100, "y": 350, "w": 600, "h": 4, "color": "#74C69D"},
    {"type": "circle", "x": 400, "y": 200, "r": 80, "color": "rgba(245,166,35,0.2)"}
  ]
}

Rules:
- background: hex color or linear-gradient(135deg, #hex1, #hex2)
- element types: text, rect, circle only
- text align: "center" or "left"
- Use brand colors: gold #F5A623, dark #050A14, green #74C69D
- Max 8 elements
- Make it professional and striking
- Return ONLY the JSON, nothing else`
        }]
      })
    });

    clearTimeout(timeout);

    if (!response.ok) throw new Error(`Server error: ${response.status}`);

    const data = await response.json();
    if (!data.content || !data.content[0]) throw new Error('Empty response. Try again.');

    const text = data.content[0].text.trim();
    if (statusEl) statusEl.textContent = '[art] Applying design...';

    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not process. Try again.');

    const design = JSON.parse(jsonMatch[0]);
    designBg = design.background || '#050A14';
    designElements = (design.elements || []).map(e => ({...e}));
    saveDesignHistory();
    renderDesign();

    if (statusEl) { statusEl.textContent = '[ok] Design generated!'; statusEl.style.color = '#74C69D'; }
    setTimeout(() => { if (statusEl) statusEl.textContent = ''; }, 3000);

  } catch(e) {
    const msg = e.name === 'AbortError' ? 'Request timed out. Try again.' : e.message;
    if (statusEl) { statusEl.textContent = '[x] ' + msg; statusEl.style.color = '#E63329'; }
    console.error('Design generation error:', e);
  }

  if (btn) { btn.textContent = '[*] Generate Design'; btn.disabled = false; }
}

// ---- CROP SYSTEM ----
let cropActive = false;
let cropRatio = 'free';
let cropStart = null;
let cropRect = { x:0, y:0, w:0, h:0 };
let isCropping = false;

window._toggleCrop = window.toggleCrop = function() {
  cropActive = !cropActive;
  const overlay = document.getElementById('crop-overlay');
  const controls = document.getElementById('crop-controls');
  const selection = document.getElementById('crop-selection');
  if (cropActive) {
    overlay.style.display = 'block';
    controls.style.display = 'block';
    selection.style.display = 'none';
    cropRect = {x:0,y:0,w:0,h:0};
    addLog('info','[crop] Click and drag on canvas to select crop area');
  } else { cancelCrop(); }
}

window._setCropRatio = window.setCropRatio = function(ratio) {
  cropRatio = ratio;
  document.querySelectorAll('.crop-ratio-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function getDesignCanvasPos(e) {
  const canvas = document.getElementById('design-canvas');
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height),
    clientX: e.clientX, clientY: e.clientY
  };
}

document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('crop-overlay');
  overlay.addEventListener('mousedown', (e) => {
    if (!cropActive) return;
    isCropping = true;
    const pos = getDesignCanvasPos(e);
    cropStart = pos;
    cropRect = {x:pos.x, y:pos.y, w:0, h:0};
    document.getElementById('crop-selection').style.display = 'block';
  });
  overlay.addEventListener('mousemove', (e) => {
    if (!isCropping) return;
    const canvas = document.getElementById('design-canvas');
    const pos = getDesignCanvasPos(e);
    cropRect.w = Math.max(0, Math.min(canvas.width - cropRect.x, pos.x - cropStart.x));
    cropRect.h = Math.max(0, Math.min(canvas.height - cropRect.y, pos.y - cropStart.y));
    if (cropRatio !== 'free') {
      const ratios = {'1:1':1,'16:9':16/9,'9:16':9/16,'4:3':4/3,'3:4':3/4,'A4':1/1.414};
      const r = ratios[cropRatio];
      if (r) cropRect.h = cropRect.w / r;
    }
    updateDesignCropVisual();
  });
  overlay.addEventListener('mouseup', () => { isCropping = false; });
  overlay.addEventListener('touchstart', (e) => { e.preventDefault(); overlay.dispatchEvent(new MouseEvent('mousedown',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})); },{passive:false});
  overlay.addEventListener('touchmove', (e) => { e.preventDefault(); overlay.dispatchEvent(new MouseEvent('mousemove',{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})); },{passive:false});
  overlay.addEventListener('touchend', () => overlay.dispatchEvent(new MouseEvent('mouseup')));
});

function updateDesignCropVisual() {
  const canvas = document.getElementById('design-canvas');
  const canvasRect = canvas.getBoundingClientRect();
  const wrapRect = document.getElementById('canvas-wrap').getBoundingClientRect();
  const scaleX = canvasRect.width / canvas.width;
  const scaleY = canvasRect.height / canvas.height;
  const offsetX = canvasRect.left - wrapRect.left;
  const offsetY = canvasRect.top - wrapRect.top;
  const sel = document.getElementById('crop-selection');
  sel.style.left = (cropRect.x * scaleX + offsetX) + 'px';
  sel.style.top = (cropRect.y * scaleY + offsetY) + 'px';
  sel.style.width = (cropRect.w * scaleX) + 'px';
  sel.style.height = (cropRect.h * scaleY) + 'px';
}

window._applyCrop = window.applyCrop = function() {
  const canvas = document.getElementById('design-canvas');
  const cw = Math.round(Math.abs(cropRect.w));
  const ch = Math.round(Math.abs(cropRect.h));
  if (cw < 10 || ch < 10) { addLog('error','[x] Select a larger area'); return; }
  const ctx = canvas.getContext('2d');
  const imageData = ctx.getImageData(cropRect.x, cropRect.y, cw, ch);
  W = cw; H = ch;
  canvas.width = W; canvas.height = H;
  ctx.putImageData(imageData, 0, 0);
  cancelCrop();
  addLog('success', `[ok] Cropped to ${W}x${H}px`);
}

window._cancelCrop = window.cancelCrop = function() {
  cropActive = false; isCropping = false; cropStart = null;
  document.getElementById('crop-overlay').style.display = 'none';
  document.getElementById('crop-controls').style.display = 'none';
  document.getElementById('crop-selection').style.display = 'none';
}

initCanvas();
